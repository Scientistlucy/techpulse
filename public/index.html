<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechPulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page">
    <header class="masthead">
      <p class="dateline" id="dateline"></p>
      <h1 class="wordmark">TechPulse</h1>
      <p class="deck">Stories from Hacker News</p>
    </header>

    <nav class="toolbar" aria-label="Feed controls">
      <div class="tabs" role="tablist" aria-label="Story categories">
        <button class="tab-btn active" data-type="top" type="button" role="tab">Top</button>
        <button class="tab-btn" data-type="new" type="button" role="tab">New</button>
        <button class="tab-btn" data-type="best" type="button" role="tab">Best</button>
      </div>
      <div class="search-wrap">
        <label class="sr-only" for="search-input">Search stories</label>
        <input id="search-input" type="search" placeholder="Filter by title or author" autocomplete="off">
        <button id="search-clear" class="search-clear" type="button" hidden aria-label="Clear search">×</button>
      </div>
    </nav>

    <p id="status-bar" class="status-bar" aria-live="polite">Loading…</p>

    <main id="story-list" class="story-list" aria-live="polite"></main>

    <footer class="colophon">
      <p>Data from <a href="https://github.com/HackerNews/API" target="_blank" rel="noopener noreferrer">Hacker News</a></p>
    </footer>
  </div>

  <div id="story-modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <p id="modal-source" class="source-note"></p>
        <button id="modal-close" class="modal-close" type="button" aria-label="Close">Close</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
